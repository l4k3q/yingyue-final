<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('dist/bootstrap/css/bootstrap.min.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .login-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .left-panel {
            width: 55%;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #3d7abc 100%);
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }
        .logo-box {
            width: 60px;
            height: 60px;
            background-color: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .logo-box i {
            font-size: 28px;
        }
        .brand-title {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .brand-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        .feature-list {
            position: relative;
            z-index: 1;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .feature-icon i {
            font-size: 22px;
        }
        .feature-content h4 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }
        .feature-content p {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin: 0;
        }
        .right-panel {
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background-color: #f5f7fa;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #1f2937;
            margin: 0 0 8px 0;
        }
        .login-header p {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }
        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 44px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background-color: #fafafa;
        }
        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #fff;
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .input-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            cursor: pointer;
        }
        .input-toggle:hover {
            color: #6b7280;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
        }
        .checkbox-text {
            font-size: 14px;
            color: #6b7280;
        }
        .forgot-link {
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-btn {
            width: 100%;
            height: 48px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .login-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #6b7280;
        }
        .register-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .face-section {
            margin-top: 28px;
        }
        .face-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .face-divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid #e5e7eb;
        }
        .face-divider span {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 500;
        }
        .face-video-container {
            position: relative;
            width: 100%;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px dashed #d1d5db;
            background-color: #f9fafb;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }
        .face-video-container.has-video {
            border-style: solid;
            border-color: #2563eb;
            background-color: #000;
        }
        #faceVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .face-video-container.has-video #faceVideo {
            display: block;
        }
        #faceCanvas {
            display: none;
        }
        #facePlaceholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            z-index: 10;
        }
        .face-video-container.has-video #facePlaceholder {
            display: none;
        }
        .face-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .face-btn {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .face-btn.camera {
            background-color: #f3f4f6;
            color: #374151;
            border: 1.5px solid #d1d5db;
        }
        .face-btn.camera:hover {
            background-color: #e5e7eb;
        }
        .face-btn.register {
            background-color: #16a34a;
            color: #fff;
        }
        .face-btn.register:hover {
            background-color: #15803d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }
        .face-btn.login {
            background-color: #2563eb;
            color: #fff;
        }
        .face-btn.login:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .face-btn.stop {
            background-color: #dc2626;
            color: #fff;
        }
        .face-btn.stop:hover {
            background-color: #b91c1c;
        }
        .face-status {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .face-status.success {
            background-color: #dcfce7;
            color: #166534;
            display: flex;
        }
        .face-status.error {
            background-color: #fee2e2;
            color: #991b1b;
            display: flex;
        }
        .face-status.info {
            background-color: #dbeafe;
            color: #1e40af;
            display: flex;
        }
        @media (max-width: 768px) {
            .left-panel {
                display: none;
            }
            .right-panel {
                width: 100%;
                padding: 40px 24px;
            }
            .login-card {
                padding: 40px 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="left-panel">
            <div class="logo-box">
                <i class="fas fa-chart-bar"></i>
            </div>
            <div class="brand-title">智能瞭望与智能问数系统</div>
            <div class="brand-subtitle">企业级智能数据分析平台</div>
            
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="feature-content">
                        <h4>安全可靠</h4>
                        <p>企业级数据安全防护，多重加密保障</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="feature-content">
                        <h4>智能分析</h4>
                        <p>全方位数据洞察，AI驱动决策支持</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="feature-content">
                        <h4>自然语言交互</h4>
                        <p>智能问数，对话式数据查询体验</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="login-card">
                <div class="login-header">
                    <h2>账号登录</h2>
                    <p>请输入账号信息登录系统</p>
                </div>
                
                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
                {% end %}
                
                <form method="post" action="?">
                    {% module xsrf_form_html() %}
                    
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" name="username" placeholder="请输入用户名" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="password" placeholder="请输入密码" class="form-input" required id="password">
                            <i class="fas fa-eye-slash input-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input" name="remember">
                            <span class="checkbox-text">记住账号</span>
                        </label>
                        <a href="javascript:void(0);" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>登录系统</span>
                    </button>
                </form>
                
                <div class="face-section">
                    <div class="face-divider">
                        <hr>
                        <span><i class="fas fa-face-smile"></i> 人脸识别登录</span>
                        <hr>
                    </div>
                    
                    <div class="face-video-container" id="faceVideoContainer">
                        <video id="faceVideo" autoplay playsinline></video>
                        <canvas id="faceCanvas"></canvas>
                        <div id="facePlaceholder">
                            <i class="fas fa-camera" style="font-size: 48px; margin-bottom: 8px;"></i>
                            <span>点击下方按钮开启摄像头</span>
                        </div>
                    </div>
                    
                    <div class="face-controls">
                        <button class="face-btn camera" id="startCameraBtn" onclick="startCamera()">
                            <i class="fas fa-video"></i>
                            <span>开启摄像头</span>
                        </button>
                        <button class="face-btn stop" id="stopCameraBtn" onclick="stopCamera()" style="display: none;">
                            <i class="fas fa-stop"></i>
                            <span>关闭摄像头</span>
                        </button>
                    </div>
                    
                    <div class="face-controls">
                        <button class="face-btn register" onclick="registerFace()">
                            <i class="fas fa-user-plus"></i>
                            <span>注册人脸</span>
                        </button>
                        <button class="face-btn login" onclick="loginByFace()">
                            <i class="fas fa-face-smile"></i>
                            <span>刷脸登录</span>
                        </button>
                    </div>
                    
                    <div class="face-status" id="faceStatus"></div>
                </div>
                
                <div class="register-link">
                    还没有账号？<a href="/register">立即注册</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });

        let mediaStream = null;
        const video = document.getElementById('faceVideo');
        const canvas = document.getElementById('faceCanvas');
        const videoContainer = document.getElementById('faceVideoContainer');
        const placeholder = document.getElementById('facePlaceholder');
        const startBtn = document.getElementById('startCameraBtn');
        const stopBtn = document.getElementById('stopCameraBtn');

        function getXsrfToken() {
            const cookies = document.cookie.split('; ');
            for (const cookie of cookies) {
                if (cookie.startsWith('_xsrf=')) {
                    return cookie.split('=')[1];
                }
            }
            return '';
        }

        async function startCamera() {
            try {
                showFaceStatus('正在请求摄像头权限...', 'info');
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                video.srcObject = mediaStream;
                videoContainer.classList.add('has-video');
                placeholder.style.display = 'none';
                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';
                showFaceStatus('摄像头已开启，请正对摄像头', 'success');
            } catch (error) {
                console.error('摄像头开启失败:', error);
                showFaceStatus('无法访问摄像头，请检查权限设置', 'error');
            }
        }

        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            video.srcObject = null;
            videoContainer.classList.remove('has-video');
            placeholder.style.display = 'block';
            startBtn.style.display = 'flex';
            stopBtn.style.display = 'none';
            showFaceStatus('摄像头已关闭', 'info');
        }

        function captureFrame() {
            if (!mediaStream) {
                showFaceStatus('请先开启摄像头', 'error');
                return null;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/png');
        }

        async function registerFace() {
            const username = prompt('请输入用户名：');
            if (!username) {
                showFaceStatus('请输入用户名', 'error');
                return;
            }
            const password = prompt('请输入密码：');
            if (!password) {
                showFaceStatus('请输入密码', 'error');
                return;
            }

            const imageData = captureFrame();
            if (!imageData) {
                return;
            }

            showFaceStatus('正在注册人脸...', 'info');

            try {
                const response = await fetch('/api/face/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRFToken': getXsrfToken()
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        image: imageData.split(',')[1]
                    })
                });

                const result = await response.json();
                if (result.success) {
                    showFaceStatus(result.message, 'success');
                } else {
                    showFaceStatus(result.message, 'error');
                }
            } catch (error) {
                console.error('人脸注册失败:', error);
                showFaceStatus('注册失败，请重试', 'error');
            }
        }

        async function loginByFace() {
            const imageData = captureFrame();
            if (!imageData) {
                return;
            }

            showFaceStatus('正在识别人脸...', 'info');

            try {
                const response = await fetch('/api/face/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRFToken': getXsrfToken()
                    },
                    body: JSON.stringify({
                        image: imageData.split(',')[1]
                    })
                });

                const result = await response.json();
                if (result.success) {
                    showFaceStatus('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/index';
                    }, 1000);
                } else {
                    showFaceStatus(result.message, 'error');
                }
            } catch (error) {
                console.error('人脸登录失败:', error);
                showFaceStatus('登录失败，请重试', 'error');
            }
        }

        function showFaceStatus(message, type) {
            const statusEl = document.getElementById('faceStatus');
            statusEl.textContent = message;
            statusEl.className = 'face-status ' + type;
        }
    </script>
</body>
</html>
