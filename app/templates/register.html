<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('dist/bootstrap/css/bootstrap.min.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .register-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .left-panel {
            width: 55%;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #3d7abc 100%);
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        .left-panel::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
        }
        .logo-box {
            width: 60px;
            height: 60px;
            background-color: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        .logo-box i {
            font-size: 28px;
        }
        .brand-title {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .brand-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        .feature-list {
            position: relative;
            z-index: 1;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .feature-icon i {
            font-size: 22px;
        }
        .feature-content h4 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }
        .feature-content p {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin: 0;
        }
        .right-panel {
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background-color: #f5f7fa;
        }
        .register-card {
            width: 100%;
            max-width: 450px;
            background-color: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .register-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #1f2937;
            margin: 0 0 8px 0;
        }
        .register-header p {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }
        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 44px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background-color: #fafafa;
        }
        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #fff;
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .input-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            cursor: pointer;
        }
        .input-toggle:hover {
            color: #6b7280;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
        }
        .checkbox-text {
            font-size: 13px;
            color: #6b7280;
        }
        .checkbox-text a {
            color: #2563eb;
            text-decoration: none;
        }
        .checkbox-text a:hover {
            text-decoration: underline;
        }
        .register-btn {
            width: 100%;
            height: 48px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .register-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .success-message {
            background-color: #dcfce7;
            color: #166534;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 768px) {
            .left-panel {
                display: none;
            }
            .right-panel {
                width: 100%;
                padding: 40px 24px;
            }
            .register-card {
                padding: 40px 28px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="left-panel">
            <div class="logo-box">
                <i class="fas fa-chart-bar"></i>
            </div>
            <div class="brand-title">智能瞭望与智能问数系统</div>
            <div class="brand-subtitle">企业级智能数据分析平台</div>
            
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="feature-content">
                        <h4>安全可靠</h4>
                        <p>企业级数据安全防护，多重加密保障</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="feature-content">
                        <h4>智能分析</h4>
                        <p>全方位数据洞察，AI驱动决策支持</p>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="feature-content">
                        <h4>自然语言交互</h4>
                        <p>智能问数，对话式数据查询体验</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="register-card">
                <div class="register-header">
                    <h2>账号注册</h2>
                    <p>创建账号，开始智能问数之旅</p>
                </div>
                
                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
                {% end %}
                
                {% if success %}
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    {{ success }}
                </div>
                {% end %}
                
                <form method="post" action="?">
                    {% module xsrf_form_html() %}
                    
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" name="username" placeholder="请输入用户名" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="password" placeholder="请输入密码" class="form-input" required id="password">
                            <i class="fas fa-eye-slash input-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="confirm_password" placeholder="请再次输入密码" class="form-input" required id="confirmPassword">
                            <i class="fas fa-eye-slash input-toggle" id="toggleConfirmPassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input" name="agree" required>
                            <span class="checkbox-text">我已阅读并同意<a href="javascript:void(0);">用户协议</a>和<a href="javascript:void(0);">隐私政策</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="register-btn">
                        <i class="fas fa-user-plus"></i>
                        <span>注册账号</span>
                    </button>
                </form>
                
                <div class="login-link">
                    已有账号？<a href="/">立即登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
    </script>
</body>
</html>
