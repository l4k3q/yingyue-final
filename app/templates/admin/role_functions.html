{% extends "../admin/base.html" %}
{% block body %}
<style>
    .permission-tree {
        background: #fff;
        border: 1px solid #E5E6EB;
        border-radius: 8px;
        padding: 8px 0;
        min-height: 260px;
    }
    .permission-node {
        padding: 10px 16px;
        border-bottom: 1px solid #F2F3F5;
    }
    .permission-node:last-child {
        border-bottom: none;
    }
    .permission-node.parent {
        background: #F7F8FA;
        font-weight: 600;
    }
    .permission-node.child {
        padding-left: 46px;
    }
    .permission-node label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        cursor: pointer;
    }
    .permission-node input {
        width: 16px;
        height: 16px;
    }
    .permission-url {
        margin-left: auto;
        color: #86909C;
        font-size: 12px;
        font-family: Consolas, monospace;
        font-weight: 400;
    }
</style>

<div class="admin-page">
    <div class="page-header">
        <h2>角色权限配置 - {{ role['name'] if role else '' }}</h2>
        <div class="header-actions">
            <button class="layui-btn" type="button" onclick="selectAll()">
                <i class="layui-icon layui-icon-check"></i> 全选
            </button>
            <button class="layui-btn layui-btn-primary" type="button" onclick="clearAll()">
                <i class="layui-icon layui-icon-close"></i> 取消全选
            </button>
        </div>
    </div>

    <form id="permissionsForm" action="/admin/roles/functions" method="post">
        {% module xsrf_form_html() %}
        <input type="hidden" name="role_id" value="{{ role['id'] if role else 0 }}">
        <input type="hidden" name="function_ids" id="functionIds">

        <div class="permission-tree">
            {% for func in function_nodes %}
            <div class="permission-node parent">
                <label>
                    <input class="permission-checkbox parent-checkbox" type="checkbox" name="function_check" value="{{ func['id'] }}" data-node-id="{{ func['id'] }}" {% if func['id'] in selected_ids %}checked{% end %}>
                    <i class="layui-icon {{ func.get('icon_class', 'layui-icon-app') }}"></i>
                    <span>{{ func['name'] }}</span>
                    <span class="permission-url">{{ func['url'] if func['url'] else '-' }}</span>
                </label>
            </div>
            {% if func.get('children') %}
            {% for child in func['children'] %}
            <div class="permission-node child">
                <label>
                    <input class="permission-checkbox child-checkbox" type="checkbox" name="function_check" value="{{ child['id'] }}" data-parent-id="{{ func['id'] }}" {% if child['id'] in selected_ids %}checked{% end %}>
                    <i class="layui-icon {{ child.get('icon_class', 'layui-icon-app') }}"></i>
                    <span>{{ child['name'] }}</span>
                    <span class="permission-url">{{ child['url'] if child['url'] else '-' }}</span>
                </label>
            </div>
            {% end %}
            {% end %}
            {% end %}
        </div>
    </form>

    <div class="layui-modal-footer" style="margin-top: 20px;">
        <button class="layui-btn layui-btn-primary" type="button" onclick="window.location.href='/admin/roles'">返回</button>
        <button class="layui-btn" type="button" onclick="submitPermissions()">保存配置</button>
    </div>
</div>
{% end %}

{% block script %}
<script>
function updateFunctionIds() {
    var ids = Array.from(document.querySelectorAll('.permission-checkbox:checked')).map(function(input) {
        return input.value;
    });
    document.getElementById('functionIds').value = ids.join(',');
}

function selectAll() {
    document.querySelectorAll('.permission-checkbox').forEach(function(input) {
        input.checked = true;
    });
    updateFunctionIds();
}

function clearAll() {
    document.querySelectorAll('.permission-checkbox').forEach(function(input) {
        input.checked = false;
    });
    updateFunctionIds();
}

document.querySelectorAll('.parent-checkbox').forEach(function(parent) {
    parent.addEventListener('change', function() {
        var parentId = this.getAttribute('data-node-id');
        document.querySelectorAll('.child-checkbox[data-parent-id="' + parentId + '"]').forEach(function(child) {
            child.checked = parent.checked;
        });
        updateFunctionIds();
    });
});

document.querySelectorAll('.child-checkbox').forEach(function(child) {
    child.addEventListener('change', function() {
        var parentId = this.getAttribute('data-parent-id');
        var siblings = Array.from(document.querySelectorAll('.child-checkbox[data-parent-id="' + parentId + '"]'));
        var parent = document.querySelector('.parent-checkbox[data-node-id="' + parentId + '"]');
        if (this.checked && parent) {
            parent.checked = true;
        }
        if (parent && siblings.length > 0 && siblings.every(function(item) { return !item.checked; })) {
            parent.checked = false;
        }
        updateFunctionIds();
    });
});

function submitPermissions() {
    updateFunctionIds();
    document.getElementById('permissionsForm').submit();
}

updateFunctionIds();
</script>
{% end %}
