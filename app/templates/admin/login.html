<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('dist/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ static_url('dist/layui/css/layui.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #f2f3f5;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .login-container {
            display: flex;
            min-height: 100vh;
        }
        .brand-section {
            width: 50%;
            background-color: #165DFF;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
        }
        .login-section {
            width: 50%;
            background-color: #f2f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }
        .logo-box {
            width: 50px;
            height: 50px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo-box i {
            font-size: 24px;
        }
        .brand-title {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .brand-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        .feature-card {
            height: 200px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23fff' stop-opacity='0.1'/%3E%3Cstop offset='100%25' stop-color='%23fff' stop-opacity='0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)'/%3E%3C/svg%3E");
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 50%);
        }
        .feature-card i {
            font-size: 64px;
            color: rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .feature-icon i {
            font-size: 18px;
        }
        .feature-text {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-title {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .login-desc {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            display: block;
        }
        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 12px 0 40px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: #fff;
        }
        .form-input:focus {
            border-color: #165DFF;
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
        }
        .input-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            cursor: pointer;
        }
        .input-toggle:hover {
            color: #6b7280;
        }
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .checkbox-input {
            width: 16px;
            height: 16px;
            accent-color: #165DFF;
        }
        .checkbox-text {
            font-size: 13px;
            color: #6b7280;
        }
        .forgot-link {
            font-size: 13px;
            color: #165DFF;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            background-color: #165DFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .login-btn:hover {
            background-color: #0E42D2;
        }
        .copyright {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #9ca3af;
        }
        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .brand-section {
                display: none;
            }
            .login-section {
                width: 100%;
                padding: 40px 24px;
            }
            .login-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-section">
            <div class="logo-box">
                <i class="fas fa-chart-bar"></i>
            </div>
            <div class="brand-title">智能瞭望与智能问数系统</div>
            <div class="brand-subtitle">企业级智能数据分析平台</div>
            
            <div class="feature-card">
                <i class="fas fa-network-wired"></i>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <span class="feature-text">安全可靠的企业级数据防护</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="feature-text">全方位智能数据洞察分析</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <span class="feature-text">AI驱动的自然语言问数能力</span>
            </div>
        </div>
        
        <div class="login-section">
            <div class="login-card">
                <div class="login-title">账号登录</div>
                <div class="login-desc">请输入您的账号信息登录系统</div>
                
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% end %}
                
                <form method="post" action="?">
                    {% module xsrf_form_html() %}
                    
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" name="username" placeholder="请输入用户名" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="password" placeholder="请输入密码" class="form-input" required id="password">
                            <i class="fas fa-eye-slash input-toggle" id="togglePassword"></i>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input" name="remember">
                            <span class="checkbox-text">记住账号</span>
                        </label>
                        <a href="javascript:void(0);" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>登录系统</span>
                    </button>
                </form>
                
                <div class="copyright">© 2025 智能瞭望与智能问数系统 版权所有</div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
    </script>
</body>
</html>
