{% extends "../admin/base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ static_url('css/screen.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% end %}
{% block body %}
<div id="screen-app" v-cloak>
  <div class="screen-wrapper">
    <!-- 顶部标题 -->
    <div class="screen-header">
      <dv-decoration-8 class="decoration-left" :color="['#568aea', '#000000']" />
      <div class="title">
        <h1>瞭望采集数智可视化大屏</h1>
        <dv-decoration-6 class="title-bottom" :reverse="true" :color="['#50e3c2', '#67a1e5']" />
      </div>
      <dv-decoration-8 class="decoration-right" :reverse="true" :color="['#568aea', '#000000']" />
    </div>

    <!-- 顶部统计卡片 -->
    <div class="stats-bar">
      <div class="stat-card" v-for="item in stats" :key="item.label">
        <div>
          <div class="stat-value" v-text="item.value"></div>
          <div class="stat-label" v-text="item.label"></div>
        </div>
        <div class="stat-icon">
          <i :class="item.icon"></i>
        </div>
      </div>
    </div>

    <!-- 主体三栏 -->
    <div class="screen-main">
      <!-- 左侧：采集源柱状图 -->
      <div class="screen-left">
        <dv-border-box-12>
          <div class="screen-panel">
            <h3 class="panel-title">采集源统计</h3>
            <div ref="sourceChart" class="chart"></div>
          </div>
        </dv-border-box-12>
      </div>

      <!-- 中间：3D 地球 -->
      <div class="screen-center">
        <dv-border-box-13>
          <div class="screen-panel">
            <h3 class="panel-title">全球采集态势</h3>
            <div ref="earthChart" class="chart"></div>
          </div>
        </dv-border-box-13>
      </div>

      <!-- 右侧：资讯饼图 + 热点词云 -->
      <div class="screen-right">
        <dv-border-box-12>
          <div class="screen-panel">
            <h3 class="panel-title">资讯分类</h3>
            <div ref="pieChart" class="chart"></div>
          </div>
        </dv-border-box-12>
        <dv-border-box-12>
          <div class="screen-panel">
            <h3 class="panel-title">热点词云</h3>
            <div ref="wordCloudChart" class="chart"></div>
          </div>
        </dv-border-box-12>
      </div>
    </div>

    <!-- 底部：采集日志滚动栏 -->
    <div class="screen-bottom">
      <dv-border-box-13>
        <div class="screen-panel">
          <h3 class="panel-title">采集日志</h3>
          <div class="log-scroll">
            <div class="log-list">
              <div class="log-item" v-for="log in logs" :key="log.id">
                <span class="log-time" v-text="log.time"></span>
                <span class="log-source" v-text="log.source"></span>
                <span :class="['log-status-' + log.status, 'log-text']" v-text="log.text"></span>
              </div>
            </div>
          </div>
        </div>
      </dv-border-box-13>
    </div>
  </div>
</div>
{% end %}
{% block script %}
<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@iamzzg/data-view@2.10.0/dist/datav.map.vue.js"></script>
<script src="https://unpkg.com/echarts@4.9.0/dist/echarts.min.js"></script>
<script src="{{ static_url('vendor/echarts-gl/echarts-gl.min.js') }}"></script>
<script src="https://unpkg.com/echarts-wordcloud@1.1.3/dist/echarts-wordcloud.min.js"></script>
<script src="https://unpkg.com/axios@0.21.1/dist/axios.min.js"></script>
<script>
  // 读取 Tornado XSRF Token 并设置到 axios 默认请求头
  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^|;\\s*)' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : '';
  }
  axios.defaults.headers.common['X-Xsrftoken'] = getCookie('_xsrf');

  new Vue({
    el: '#screen-app',
    data: {
      stats: [],
      logs: [],
      sources: { categories: [], values: [] },
      newsTypes: [],
      wordCloud: [],
      geoData: { points: [], lines: [] },
      charts: {},
      refreshTimer: null,
      earthTextureDataUrl: null,
      earthInited: false
    },
    mounted() {
      this.$nextTick(() => {
        this.initCharts();
        this.loadData();
        this.startAutoRefresh();
        this.handleResize = this.debounce(this.resizeAll, 200);
        window.addEventListener('resize', this.handleResize);
        // DataV 边框组件异步渲染，延迟一次 resize 确保图表尺寸正确
        setTimeout(() => this.resizeAll(), 600);
      });
    },
    beforeDestroy() {
      window.removeEventListener('resize', this.handleResize);
      this.stopAutoRefresh();
      Object.values(this.charts).forEach(chart => chart && chart.dispose());
    },
    methods: {
      debounce(fn, wait) {
        let timer = null;
        return function() {
          clearTimeout(timer);
          timer = setTimeout(() => fn.apply(this, arguments), wait);
        };
      },
      resizeAll() {
        Object.values(this.charts).forEach(chart => chart && chart.resize());
      },
      initCharts() {
        // 初始化空图表实例，确保 DOM 尺寸就绪
        this.charts.source = echarts.init(this.$refs.sourceChart);
        this.charts.earth = echarts.init(this.$refs.earthChart);
        this.charts.pie = echarts.init(this.$refs.pieChart);
        this.charts.wordCloud = echarts.init(this.$refs.wordCloudChart);
      },
      loadData() {
        const sourcesReq = axios.get('/api/screen/sources');
        const keywordsReq = axios.get('/api/screen/keywords');
        const geoReq = axios.get('/api/screen/geo');
        const realtimeReq = axios.get('/api/screen/realtime');

        axios.all([sourcesReq, keywordsReq, geoReq, realtimeReq])
          .then(axios.spread((sourcesRes, keywordsRes, geoRes, realtimeRes) => {
            const sourcesData = sourcesRes.data || {};
            const keywordsData = keywordsRes.data || {};
            const geoData = geoRes.data || {};
            const realtimeData = realtimeRes.data || {};

            // ① 来源统计（柱状图）
            const sourceRows = sourcesData.sources || [];
            this.sources = {
              categories: sourceRows.map(item => item.source || item.name || '未知'),
              values: sourceRows.map(item => item.value || 0)
            };
            this.newsTypes = sourcesData.news_types || [];

            // ② 关键词统计（词云）
            this.wordCloud = keywordsData.words || [];

            // ③ 地理点位（3D 地球）
            this.geoData = {
              points: geoData.points || [],
              lines: geoData.lines || []
            };

            // ④ 实时运营数据
            this.stats = this.buildStats(realtimeData);
            this.logs = (realtimeData.logs || []).map((log, idx) => ({ id: idx + 1, ...log }));

            this.updateCharts();
          }))
          .catch(err => {
            console.warn('大屏接口请求失败，使用默认数据', err);
            this.useFallbackData();
            this.updateCharts();
          });
      },
      buildStats(realtime) {
        return [
          { label: '累计采集源', value: realtime.online_sources || 0, icon: 'fas fa-satellite-dish' },
          { label: '今日采集数', value: realtime.today_records || 0, icon: 'fas fa-download' },
          { label: '入库资讯数', value: realtime.total_records || 0, icon: 'fas fa-database' },
          { label: '深度采集任务', value: realtime.deep_tasks || 0, icon: 'fas fa-tasks' }
        ];
      },
      startAutoRefresh() {
        this.stopAutoRefresh();
        this.refreshTimer = setInterval(() => {
          this.loadData();
        }, 30000);
      },
      stopAutoRefresh() {
        if (this.refreshTimer) {
          clearInterval(this.refreshTimer);
          this.refreshTimer = null;
        }
      },
      updateCharts() {
        this.updateSourceChart();
        this.updateEarthChart();
        this.updatePieChart();
        this.updateWordCloudChart();
      },
      useFallbackData() {
        this.stats = [
          { label: '累计采集源', value: 4, icon: 'fas fa-satellite-dish' },
          { label: '今日采集数', value: 1286, icon: 'fas fa-download' },
          { label: '入库资讯数', value: 8932, icon: 'fas fa-database' },
          { label: '深度采集任务', value: 156, icon: 'fas fa-tasks' }
        ];
        this.logs = [
          { id: 1, time: '2026-07-15 10:23:18', source: '百度新闻', text: '成功采集关键词“人工智能”相关资讯 32 条', status: 'success' },
          { id: 2, time: '2026-07-15 10:21:05', source: '搜狗新闻', text: '成功采集关键词“数字经济”相关资讯 28 条', status: 'success' },
          { id: 3, time: '2026-07-15 10:18:42', source: '新浪新闻', text: '采集源响应超时，已记录重试', status: 'fail' },
          { id: 4, time: '2026-07-15 10:15:30', source: '360新闻', text: '成功采集关键词“智慧城市”相关资讯 19 条', status: 'success' },
          { id: 5, time: '2026-07-15 10:12:11', source: '百度新闻', text: '成功采集关键词“大模型”相关资讯 45 条', status: 'success' }
        ];
        this.sources = {
          categories: ['百度新闻', '搜狗新闻', '新浪新闻', '360新闻'],
          values: [320, 280, 190, 210]
        };
        this.newsTypes = [
          { value: 335, name: '政务' },
          { value: 310, name: '财经' },
          { value: 234, name: '科技' },
          { value: 135, name: '民生' },
          { value: 148, name: '国际' }
        ];
        this.wordCloud = [
          { name: '人工智能', value: 100 },
          { name: '数字经济', value: 85 },
          { name: '大模型', value: 78 },
          { name: '智慧城市', value: 72 },
          { name: '碳中和', value: 65 }
        ];
        this.geoData = {
          points: [
            { name: '北京', value: [116.40, 39.90, 8] },
            { name: '上海', value: [121.47, 31.23, 6] },
            { name: '广州', value: [113.26, 23.13, 5] }
          ],
          lines: [
            { from: [116.40, 39.90], to: [121.47, 31.23] },
            { from: [121.47, 31.23], to: [113.26, 23.13] }
          ]
        };
      },
      updateSourceChart() {
        const chart = this.charts.source;
        const option = {
          backgroundColor: 'transparent',
          tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
          grid: { top: '15%', left: '3%', right: '8%', bottom: '3%', containLabel: true },
          xAxis: {
            type: 'category',
            data: this.sources.categories,
            axisLine: { lineStyle: { color: '#568aea' } },
            axisLabel: { color: '#d3d6dd', fontSize: 12 }
          },
          yAxis: {
            type: 'value',
            splitLine: { lineStyle: { color: 'rgba(86,138,234,0.15)' } },
            axisLabel: { color: '#d3d6dd' }
          },
          series: [{
            name: '采集量',
            type: 'bar',
            barWidth: '50%',
            data: this.sources.values,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#50e3c2' },
                { offset: 1, color: '#568aea' }
              ]),
              borderRadius: [4, 4, 0, 0]
            }
          }]
        };
        chart.setOption(option, true);
      },
      updateEarthChart() {
        const chart = this.charts.earth;
        const points = this.geoData.points.map(p => ({
          name: p.name,
          value: p.value
        }));
        const lines = this.geoData.lines.map(l => ({
          coords: [l.from, l.to],
          lineStyle: { color: l.color || '#568aea' }
        }));

        // 纹理只构建一次并缓存，避免每次刷新数据时重新上传纹理导致白屏闪烁
        if (this.earthTextureDataUrl) {
          this.renderEarth(chart, this.earthTextureDataUrl, points, lines);
          return;
        }

        const textureUrl = '/static/img/earth/world.topo.bathy.200401.jpg';
        const geoJsonUrl = '/static/data/world.json';

        this.buildEarthTexture(textureUrl, geoJsonUrl).then(textureCanvas => {
          try {
            this.earthTextureDataUrl = textureCanvas.toDataURL('image/png');
          } catch (e) {
            console.warn('canvas 转 data URL 失败，直接使用 canvas 对象', e);
          }
          this.renderEarth(chart, this.earthTextureDataUrl || textureCanvas, points, lines);
        }).catch(err => {
          console.error('3D 地球纹理构建失败：', err);
        });
      },

      renderEarth(chart, texture, points, lines) {
        // 首次渲染完整 option，后续仅更新 series 数据，防止 globe 纹理重新上传导致白屏
        if (this.earthInited) {
          chart.setOption({
            series: [{
              type: 'scatter3D',
              coordinateSystem: 'globe',
              name: '城市采集点',
              data: points
            }, {
              type: 'lines3D',
              coordinateSystem: 'globe',
              name: '采集源飞线',
              data: lines
            }]
          }, false);
          return;
        }

        const option = {
          backgroundColor: 'transparent',
          tooltip: {
            show: true,
            trigger: 'item',
            backgroundColor: 'rgba(11, 15, 30, 0.9)',
            borderColor: '#568aea',
            borderWidth: 1,
            textStyle: { color: '#d3d6dd' },
            formatter: function(params) {
              if (params.seriesType === 'scatter3D') {
                const val = params.value;
                return '<div style="font-weight:bold;color:#fff;margin-bottom:4px">' + params.name + '</div>' +
                       '<div>经度：' + val[0] + '</div>' +
                       '<div>纬度：' + val[1] + '</div>' +
                       '<div>采集量：' + (val[2] || 0) + '</div>';
              }
              if (params.seriesType === 'lines3D') {
                return '<div style="font-weight:bold;color:#fff">采集源飞线</div>';
              }
              return '';
            }
          },
          globe: {
            baseTexture: texture,
            shading: 'lambert',
            light: {
              ambient: { intensity: 0.5 },
              main: { intensity: 0.8 }
            },
            viewControl: {
              autoRotate: true,
              autoRotateSpeed: 5,
              autoRotateAfterStill: 2,
              rotateSensitivity: 2,
              zoomSensitivity: 2,
              distance: 220,
              alpha: 30,
              beta: 160,
              targetCoord: [116.46, 39.92]
            },
            atmosphere: {
              show: true,
              glowPower: 8,
              color: '#568aea'
            }
          },
          series: [{
            type: 'scatter3D',
            coordinateSystem: 'globe',
            name: '城市采集点',
            data: points,
            symbolSize: function(val) { return Math.max(5, (val[2] || 1) * 1.8); },
            itemStyle: {
              color: '#50e3c2',
              opacity: 0.95,
              borderWidth: 1,
              borderColor: '#fff'
            },
            emphasis: {
              itemStyle: { color: '#ffeb3b' }
            },
            label: { show: false }
          }, {
            type: 'lines3D',
            coordinateSystem: 'globe',
            name: '采集源飞线',
            data: lines,
            effect: {
              show: true,
              period: 4,
              trailWidth: 3,
              trailLength: 0.5,
              trailOpacity: 1,
              trailColor: '#568aea'
            },
            lineStyle: {
              width: 1,
              color: '#568aea',
              opacity: 0.4
            }
          }]
        };
        chart.setOption(option, true);
        this.earthInited = true;
      },

      // 异步构建带国界的地球纹理画布
      buildEarthTexture(textureUrl, geoJsonUrl) {
        const width = 4096;
        const height = 2048;
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#12265f';
        ctx.fillRect(0, 0, width, height);

        return new Promise((resolve) => {
          const img = new Image();
          // 同源本地图片无需 crossOrigin，避免 CORS 导致画布被污染
          if (textureUrl.indexOf('://') !== -1) {
            img.crossOrigin = 'anonymous';
          }
          img.onload = () => {
            ctx.drawImage(img, 0, 0, width, height);
            this.drawWorldBorders(ctx, geoJsonUrl, width, height).then(() => resolve(canvas));
          };
          img.onerror = () => {
            this.drawWorldBorders(ctx, geoJsonUrl, width, height).then(() => resolve(canvas));
          };
          img.src = textureUrl;
        });
      },

      // 读取 world.json 并在画布上绘制国界
      drawWorldBorders(ctx, geoJsonUrl, width, height) {
        return axios.get(geoJsonUrl).then(res => {
          const geoJson = res.data;
          ctx.save();
          ctx.strokeStyle = 'rgba(74, 175, 255, 0.65)';
          ctx.lineWidth = 2;
          ctx.lineJoin = 'round';
          ctx.lineCap = 'round';
          ctx.beginPath();

          const project = function(lon, lat) {
            return {
              x: ((lon + 180) / 360) * width,
              y: ((90 - lat) / 180) * height
            };
          };

          const drawRing = function(ring) {
            if (!ring || ring.length < 2) return;
            const start = project(ring[0][0], ring[0][1]);
            ctx.moveTo(start.x, start.y);
            for (let i = 1; i < ring.length; i++) {
              const p = project(ring[i][0], ring[i][1]);
              ctx.lineTo(p.x, p.y);
            }
          };

          for (let i = 0; i < (geoJson.features || []).length; i++) {
            const geom = geoJson.features[i].geometry;
            if (!geom) continue;
            if (geom.type === 'Polygon') {
              for (let j = 0; j < geom.coordinates.length; j++) drawRing(geom.coordinates[j]);
            } else if (geom.type === 'MultiPolygon') {
              for (let p = 0; p < geom.coordinates.length; p++) {
                for (let j = 0; j < geom.coordinates[p].length; j++) drawRing(geom.coordinates[p][j]);
              }
            }
          }

          ctx.stroke();
          ctx.restore();
        }).catch(err => {
          console.warn('世界地图边界加载失败：', err);
        });
      },
      updatePieChart() {
        const chart = this.charts.pie;
        const option = {
          backgroundColor: 'transparent',
          tooltip: { trigger: 'item' },
          legend: {
            orient: 'vertical',
            right: '5%',
            top: 'center',
            textStyle: { color: '#d3d6dd', fontSize: 12 }
          },
          series: [{
            name: '资讯分类',
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['35%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 6,
              borderColor: '#0b0f1e',
              borderWidth: 2
            },
            label: { show: false },
            data: this.newsTypes
          }]
        };
        chart.setOption(option, true);
      },
      updateWordCloudChart() {
        const chart = this.charts.wordCloud;
        const words = this.wordCloud || [];
        if (!words.length) return;

        const maxValue = Math.max.apply(null, words.map(w => w.value || 1));
        const totalValue = words.reduce((sum, w) => sum + (w.value || 0), 0);

        const neonPalette = ['#00f2ff', '#00ff9d', '#568aea', '#a855f7', '#ff52b1', '#ff6b6b', '#ffd166', '#06ffa5'];
        const getColor = function(value) {
          const ratio = value / maxValue;
          const idx = Math.min(Math.floor(ratio * neonPalette.length), neonPalette.length - 1);
          return neonPalette[neonPalette.length - 1 - idx];
        };
        const randomRotation = function() {
          const steps = [-25, -15, -8, 0, 8, 15, 25];
          return steps[Math.floor(Math.random() * steps.length)];
        };

        const option = {
          backgroundColor: 'transparent',
          tooltip: {
            show: true,
            trigger: 'item',
            backgroundColor: 'rgba(11, 15, 30, 0.92)',
            borderColor: 'rgba(86, 138, 234, 0.6)',
            borderWidth: 1,
            padding: [10, 14],
            textStyle: { color: '#d3d6dd', fontSize: 13 },
            formatter: function(params) {
              const percent = totalValue ? ((params.value / totalValue) * 100).toFixed(1) : 0;
              return '<div style="font-weight:bold;color:#fff;font-size:15px;margin-bottom:4px">' + params.name + '</div>' +
                     '<div>出现次数：<span style="color:#50e3c2;font-weight:bold">' + params.value + '</span></div>' +
                     '<div>占比：<span style="color:#568aea">' + percent + '%</span></div>';
            }
          },
          series: [{
            type: 'wordCloud',
            shape: 'circle',
            left: '2%',
            top: '2%',
            width: '96%',
            height: '96%',
            right: null,
            bottom: null,
            sizeRange: [12, 46],
            rotationRange: [-35, 35],
            rotationStep: 10,
            gridSize: 8,
            drawOutOfBound: false,
            layoutAnimation: true,
            textStyle: {
              fontFamily: '"Orbitron", "Rajdhani", "Impact", "Arial Black", "Microsoft YaHei", sans-serif',
              fontWeight: 'bold',
              color: function(params) { return getColor(params.value); },
              textBorderColor: 'rgba(0, 0, 0, 0.7)',
              textBorderWidth: 1,
              textShadowBlur: 12,
              textShadowColor: function(params) { return getColor(params.value); },
              textShadowOffsetX: 0,
              textShadowOffsetY: 0
            },
            emphasis: {
              focus: 'self',
              textStyle: {
                color: '#ffffff',
                textShadowBlur: 22,
                textShadowColor: '#00f2ff',
                textBorderColor: '#00f2ff',
                textBorderWidth: 2,
                shadowBlur: 20,
                shadowColor: 'rgba(0, 242, 255, 0.6)'
              }
            },
            data: words.map(function(item) {
              return {
                name: item.name,
                value: item.value || 0,
                textStyle: { rotation: randomRotation() }
              };
            })
          }]
        };
        chart.setOption(option, true);
      }
    }
  });
</script>
{% end %}
